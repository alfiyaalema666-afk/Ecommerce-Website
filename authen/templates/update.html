{% extends 'main.html' %}
{% load static %}
{% block style %}
<link rel="stylesheet" href="{% static 'css/authen.css' %}">
{% endblock %}

{% block content %}
<div class="fp-container">
    <div class="fp-header">
        <h2>Update Profile</h2>
        <div class="line"></div>
    </div>
    <div class="fp-body">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="fname">First Name:</label><br>
                <input type="text" id="fname" name="fname" value="{{ request.user.first_name }}" required> <br> <br>
            </div>
            <div class="form-group">
                <label for="lname">Last Name:</label><br>
                <input type="text" id="lname" name="lname" value="{{ request.user.last_name }}" required> <br><br>
            </div>
            <div class="form-group">
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" value="{{ request.user.email }}" required> <br><br>
            </div>
            <div class="form-group">
                <label for="phone">Phone no:</label><br>
                <input type="text" id="phone" name="phone" value="{{ request.user.phone }}" required> <br> <br>
            </div>
            <div class="form-group">
                <label for="address">Address:</label><br>
                <textarea name="address" id="address" aria-valuetext="{{ request.user.address }}"></textarea><br><br>
            </div>
            <div class="form-group">
                <label for="username">Username:</label><br>
                <input type="text" id="username" name="username" value="{{ request.user.username }}"> <br><br>
                <button type="submit">Update Profile</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
